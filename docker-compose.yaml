version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnistore-app
    env_file:
      - .env
    ports:
      - '8080:8080'
    depends_on:
      - mongo
      - redis
      - minio
    environment:
      - MONGODB_URI
      - REDIS_URL
      - MINIO_ENDPOINT
      - MINIO_ACCESS_KEY
      - MINIO_SECRET_KEY
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    container_name: omnistore-mongo
    ports:
      - '27018:27017'
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: omnistore-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: omnistore-minio
    env_file:
      - .env
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    restart: unless-stopped

volumes:
  mongo-data:
  redis-data:
  minio-data:
